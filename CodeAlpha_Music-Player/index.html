<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoundWave — Music Player</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrapper">
    <div class="blob blob-1" aria-hidden="true"></div>
    <div class="blob blob-2" aria-hidden="true"></div>

    <main class="player-card" role="main">

      <header class="player-header">
        <span class="brand-logo">
          
          <svg width="22" height="18" viewBox="0 0 22 18" fill="none" aria-hidden="true">
            <rect x="0"  y="6"  width="3" height="6"  rx="1.5" fill="currentColor"/>
            <rect x="5"  y="2"  width="3" height="14" rx="1.5" fill="currentColor"/>
            <rect x="10" y="0"  width="3" height="18" rx="1.5" fill="currentColor"/>
            <rect x="15" y="3"  width="3" height="12" rx="1.5" fill="currentColor"/>
            <rect x="20" y="7"  width="2" height="4"  rx="1"   fill="currentColor"/>
          </svg>
          SoundWave
        </span>
        <span class="now-playing-badge">Now Playing</span>
      </header>


      <section class="album-section" aria-label="Album art and song info">

        <div class="album-cover-frame">
          <img
            id="album-cover"
            src="images/song1.jpg"
            alt="Album cover"
            class="album-cover"
          />
          
          <div class="spin-ring" id="spin-ring" aria-hidden="true"></div>
        </div>

        <div class="song-meta">
          <h1 class="song-title" id="song-title">Midnight Drive</h1>
          <p  class="artist-name" id="artist-name">Luna & The Waves</p>
        </div>

      </section>

      <section class="progress-section" aria-label="Playback progress">

        <div class="time-row">
          <span class="time-display" id="current-time">0:00</span>
          <span class="time-display" id="total-duration">0:00</span>
        </div>

        <div
          class="progress-track"
          id="progress-track"
          role="slider"
          aria-label="Seek"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
          tabindex="0"
        >
        
          <div class="progress-fill" id="progress-fill"></div>
          
          <div class="progress-thumb" id="progress-thumb"></div>
        </div>

      </section>

      <section class="controls-section" aria-label="Audio controls">

        
        <button class="ctrl-btn ctrl-secondary" id="btn-prev" aria-label="Previous song" title="Previous">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="19 20 9 12 19 4 19 20"/>
            <line x1="5" y1="19" x2="5" y2="5"/>
          </svg>
        </button>

        <button class="ctrl-btn ctrl-primary" id="btn-play" aria-label="Play" title="Play / Pause">
      
          <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
  
          <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
            <rect x="6" y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
        </button>

        <button class="ctrl-btn ctrl-secondary" id="btn-next" aria-label="Next song" title="Next">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 4 15 12 5 20 5 4"/>
            <line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>

      </section>

      <section class="volume-section" aria-label="Volume control">

        
        <button class="vol-icon-btn" id="btn-mute" aria-label="Mute / Unmute" title="Mute">
          
          <svg id="icon-vol-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
          
          <svg id="icon-vol-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
        </button>

        <input
          type="range"
          id="volume-slider"
          class="volume-slider"
          min="0"
          max="1"
          step="0.01"
          value="0.8"
          aria-label="Volume"
        />
       <span class="vol-label" id="vol-label">80%</span>

      </section>

    
      <section class="playlist-section" aria-label="Playlist">

        <h2 class="playlist-heading">Playlist</h2>

        <ul class="playlist" id="playlist" role="listbox" aria-label="Song list">
        </ul>

      </section>

    </main>
  </div>

  <audio id="audio-player" preload="metadata"></audio>

  <script src="script.js"></script>
</body>
</html>
